<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width,initial-scale=1">

<title>

Student Dashboard

</title>

<link rel="stylesheet"

href="style.css">

</head>

<body>

<div class="container">

<h1>

Student Registration Dashboard

</h1>

<input

id="search"

placeholder="Search Student">

<form id="form">

<input

id="name"

placeholder="Name"

required>

<input

id="email"

type="email"

placeholder="Email"

required>

<input

id="phone"

placeholder="Phone"

required>

<select id="course">

<option>

B.Tech

</option>

<option>

BCA

</option>

<option>

MCA

</option>

</select>

<select id="gender">

<option>

Male

</option>

<option>

Female

</option>

</select>

<button>

Register

</button>

</form>

<table>

<thead>

<tr>

<th>Name</th>

<th>Email</th>

<th>Course</th>

</tr>

</thead>

<tbody id="table">

</tbody>

</table>

</div>

<script src="script.js">

</script>

</body>

</html>
